# 项目相关配置
naiweilanlan:
  # 名称
  name: RouteMate
  # 版本
  version: 1.0.1
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/RouteMate/uploadPath，Linux配置 /home/RouteMate/uploadPath）
  # 本项目用macOS开发：
  profile: ${user.home}/RouteMate/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型: math(算术) char(字符) gif(动态) chinese(中文) chinese_gif(中文动态)
  # 注意: math类型需要ScriptEngine支持，如遇到问题请改用char类型
  captchaType: char
  # 验证码字体配置
  captchaFont:
    # 内置字体（用于英文数字验证码）: 1-10
    # FONT_1~FONT_10 对应数字1-10
    builtinFont: 9
    # 中文字体名称（用于中文验证码）
    # Windows: 楷体、宋体、黑体、微软雅黑
    # Linux: 文泉驿微米黑、文泉驿正黑
    # Mac: STKaiti、STSong、STHeiti
    chineseFont: 楷体
    # 中文字体大小
    chineseFontSize: 32
    # 中文字体样式: 0=PLAIN(普通) 1=BOLD(粗体) 2=ITALIC(斜体) 3=BOLD+ITALIC(粗斜体)
    chineseFontStyle: 3

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.RouteMate: debug
    org.springframework: warn

  file:
    path: ${user.home}/RouteMate/logs   # 或者 ./logs

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # 地址
    host: localhost
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # 密码
    password:
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: RouteMate20040707
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.RouteMate.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  enabled: true
  title: RouteMate 管理系统 接口文档
  description: RouteMate 后台管理系统接口文档
  version: 1.0.0
  base-package: com.RouteMate          # 关键：扫描包路径
  pathMapping: /dev-api

# ==================== Knife4j 配置 ====================
knife4j:
  enable: true
  setting:
    enableSwaggerModels: true      # 显示模型
    enableDocumentManage: true     # 开启文档管理
    enableRequestCache: true
    enableFooter: false            # 关闭底部广告
    enableFooterCustom: true
    footerCustomContent: "RouteMate 出行服务平台 © 2026"
  documents:
      group: Naiweilanlan电台
      name: RouteMate API
      description: RouteMate 智能出行服务平台接口文档
      title: RouteMate 管理系统

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: false
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 微信小程序配置
wechat:
  miniapp:
    # 小程序AppID
    appId: wx14a3b99bcc677b13
    # 小程序AppSecret
    appSecret: 9b682bb9a333cfba7e22a07471a2bde6

# AI大模型配置
ai:
  llm:
    # API地址
    apiUrl: https://ark.cn-beijing.volces.com/api/v3/chat/completions
    # API密钥
    apiKey: dcf748a1-95ee-4fb0-85cb-c4ee7908e8c6
    # 默认模型
    defaultModel: doubao-seed-1-6-lite-251015
    # 连接超时时间（毫秒）
    connectTimeout: 60000
    # 读取超时时间（毫秒）
    readTimeout: 120000
    # 最大重试次数
    maxRetries: 3
    # 是否启用流式输出
    streamEnabled: true
    # 默认系统提示词
    defaultSystemPrompt: 你是人工智能助手。
    # 最大tokens数
    maxTokens: 4096
    # 温度参数
    temperature: 0.7
    # top_p参数
    topP: 0.9
    # 是否启用重试机制
    retryEnabled: true
    # 重试间隔（毫秒）
    retryInterval: 1000

# UniApp项目配置
uniapp:
  project:
    # UniApp项目相对路径（相对于admin模块运行目录）
    path: RouteMate-uniapp

# 代码生成器项目路径配置
generator:
  project:
    # 后端项目路径 - RouteMate-system
    backend: RouteMate-system/src/main/java
    # MyBatis映射文件路径
    mybatis: RouteMate-system/src/main/resources/mapper
    # Vue2 项目路径 - RouteMate-ui
    vue2: RouteMate-ui/src
    # Vue3 项目路径 - RouteMate-vue
    vue3: RouteMate-vue/src
    # UniApp 项目路径
    uniapp: RouteMate-uniapp
